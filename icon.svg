<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)" stroke="#00d4ff" stroke-width="2" opacity="0.95"/>

  <!-- Outer ring decoration -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.4" stroke-dasharray="8 4"/>

  <!-- Document/Book base shape -->
  <g filter="url(#glow)">
    <!-- Left page -->
    <path d="M 72 72 L 72 184 L 128 168 L 128 56 Z" fill="#1e3a5f" stroke="url(#accentGrad)" stroke-width="2" opacity="0.9"/>
    <!-- Right page -->
    <path d="M 128 56 L 128 168 L 184 184 L 184 72 Z" fill="#0f2744" stroke="url(#accentGrad)" stroke-width="2" opacity="0.9"/>
    <!-- Center spine -->
    <line x1="128" y1="56" x2="128" y2="168" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
    <!-- Page lines - left -->
    <line x1="80" y1="95" x2="120" y2="87" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="80" y1="110" x2="118" y2="102" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="80" y1="125" x2="116" y2="117" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <!-- Page lines - right -->
    <line x1="136" y1="87" x2="176" y2="95" stroke="#7b2ff7" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="138" y1="102" x2="176" y2="110" stroke="#7b2ff7" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="140" y1="117" x2="176" y2="125" stroke="#7b2ff7" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Claw/Gate symbol at top -->
  <g filter="url(#glow)" transform="translate(128, 40)">
    <!-- Gate arch -->
    <path d="M -24 20 Q 0 0 24 20" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Gate bars -->
    <line x1="-16" y1="8" x2="-16" y2="22" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="-8" y1="4" x2="-8" y2="22" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="2" x2="0" y2="22" stroke="#7b2ff7" stroke-width="2" stroke-linecap="round" opacity="1"/>
    <line x1="8" y1="4" x2="8" y2="22" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="16" y1="8" x2="16" y2="22" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Claw marks -->
    <path d="M -6 -4 L -2 2 M 2 -6 L 2 2 M -2 -8 L 2 -4" fill="none" stroke="#7b2ff7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Bottom label bar -->
  <rect x="60" y="190" width="136" height="28" rx="6" fill="#0f2744" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <text x="128" y="209" font-family="monospace, 'Courier New'" font-size="13" font-weight="bold" fill="#00d4ff" text-anchor="middle" letter-spacing="1">DOC-OPENCLAW</text>
</svg>
